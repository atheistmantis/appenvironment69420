<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phone-first Webapp</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0b5cff" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Phone-first Webapp</h1>
  </header>

  <main class="container">
    <p>Welcome — this is a minimal mobile-optimized webapp.</p>
    <button class="big-btn" id="notifyBtn">Tap me</button>
  </main>

  <script>
    // Register service worker (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(console.error);
    }

    // Small demo: large tap target and touch-friendly behavior
    document.getElementById('notifyBtn').addEventListener('click', () => {
      alert('Hello from your phone-first webapp!');
    });
  </script>
</body>
</html>
